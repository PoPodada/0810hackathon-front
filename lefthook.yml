pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "commitlint.config.js"
      run: npx expo lint --fix {staged_files}
    prettier:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      exclude: "commitlint.config.js"
      run: prettier --check \"**/*.{ts,tsx,js,jsx,cjs,mjs,md,json,lintstagedrc}\"

