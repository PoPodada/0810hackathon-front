pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "commitlint.config.js"
      run: npx expo lint --fix {staged_files}
    prettier:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      exclude: "commitlint.config.js"
      run: npx prettier --check {staged_files}

pre-push:
  commands:
    eslint:
      glob: "*.{js,ts,jsx,tsx}"
      exclude: "commitlint.config.js"
      run: npx expo lint --fix {staged_files}
    prettier:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      exclude: "commitlint.config.js"
      run: npx prettier --check {staged_files}

commit-msg:
  commands:
    "lint commit message":
      run: npx commitlint --edit {1}
